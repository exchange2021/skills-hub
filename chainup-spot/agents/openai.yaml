interface:
  display_name: "ChainUp Spot"
  short_description: "ChainUp OpenAPI V2 现货+杠杆交易与账户查询"
  default_prompt: "使用 ChainUp OpenAPI V2（sapi）执行现货/杠杆的行情、下单、撤单、委托与资产查询；签名规则：GET=timestamp+GET+requestPath（不拼body/{}），POST/PUT/PATCH=timestamp+METHOD+requestPath+bodyStr（空body按{}），requestPath 必须为去掉 baseUrl 的相对路径，并附带 X-CH-APIKEY/X-CH-TS/X-CH-SIGN 与 admin-language=en_US。"
